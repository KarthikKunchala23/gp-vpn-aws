---
name: Terraform Plan and Apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      subdirectory:
        default: ''
        type: string
      working_directory:
        default: terraform/${{ github.event.inputs.subdirectory }}
        type: string
      aws_region:
        default: ap-south-1
        type: string
      environment:
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod  

jobs:
  terraform:
    uses: KarthikKunchala23/gp-github-workflows/.github/workflows/terraform.yaml@main
    permissions:
      id-token: write
      contents: read

    with:
      working_directory: ${{ github.event.inputs.working_directory || 'terraform' }}
      aws_region: ${{ github.event.inputs.aws_region || 'ap-south-1' }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
